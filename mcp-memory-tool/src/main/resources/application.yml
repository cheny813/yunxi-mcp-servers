server:
  port: 40304
  shutdown: graceful

spring:
  application:
    name: mcp-memory-tool

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  profiles:
    active: ${ENVIRONMENT:prod}

# 环境模式配置
# dev: 开发模式 - 本地测试
# prod: 生产模式 - Milvus 向量存储
yunxi:
  environment:
    mode: ${ENVIRONMENT:dev}  # dev 或 prod

# 记忆存储引擎（file 或 milvus）
memory:
  store:
    type: ${MEMORY_STORE_TYPE:milvus}  # file: 文件存储, milvus: 向量存储

# Milvus 配置（仅当 memory.store.type=milvus 时生效）
milvus:
  enabled: ${MILVUS_ENABLED:false}
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  uri: ${MILVUS_URI:http://localhost:19530}
  token: ${MILVUS_TOKEN:}
  collection-name: ${MILVUS_COLLECTION_NAME:agent_memories}
  embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1024}

# Embedding 配置（仅当使用 Milvus 时需要）
embedding:
  provider: ${EMBEDDING_PROVIDER:dashscope}  # dashscope, mock, openai
  default-dimension: ${EMBEDDING_DIMENSION:1024}
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model: ${DASHSCOPE_MODEL:text-embedding-v3}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:text-embedding-ada-002}
  mock:
    dimension: 1024

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# 日志配置（charset 配置已移至 logback-spring.xml）
logging:
  level:
    io.yunxi.mcp.memory: DEBUG
    io.yunxi.platform.framework.intelligent.memory: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
