server:
  port: ${SERVER_PORT:40101}                     # 统一规划：数据库服务

spring:
  application:
    name: yunxi-mcp-database

  datasource:
    url: jdbc:mysql://${DB_HOST:192.168.10.153}:${DB_PORT:3306}/${DB_NAME:nutrition_zhaoxian}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

# ============================================================
# 多数据库配置
