server:
  port: 40502                                    # 统一规划：基础设施服务

spring:
  application:
    name: yunxi-mcp-mqtt

# ============================================================================
# EMQ X 配置说明
# ============================================================================
# EMQ X 是开源的 MQTT 消息服务器，支持 MQTT 3.1/3.1.1/5.0 协议
# 官网: https://www.emqx.io/
#
# 安装方式:
# - Docker: docker run -d --name emqx -p 1883:1883 -p 8083:8083 -p 8883:8883 -p 8084:8084 emqx/emqx
# - Windows: 下载安装包 https://www.emqx.io/zh/downloads
# - 配置文件: etc/emqx.conf
#
# 默认端口:
# - 1883: MQTT over TCP
# - 8883: MQTT over SSL/TLS
# - 8083: MQTT over WebSocket
# - 8084: MQTT over Secure WebSocket
# - 18083: Dashboard (管理界面)
#
# 默认账号:
# - 用户名: admin
# - 密码: public
# - Dashboard: http://localhost:18083
#
# 生产环境建议:
# 1. 启用 SSL/TLS (mqtt.broker.ssl=true)
# 2. 配置认证 (username/password)
# 3. 使用集群模式提高可用性
# 4. 配置 ACL 访问控制
# ============================================================================

mqtt:
  # MQTT Broker 配置 - EMQ X
  broker:
    host: localhost
    port: 1883
    scheme: tcp
    ssl: false
    clientId: yunxi-mcp-server
    username:
    password:

  # 连接配置
  connection:
    timeout: 10
    automatic-reconnect: true
    max-reconnect-delay: 30

  # QoS 默认配置：0-最多一次, 1-至少一次, 2-刚好一次
  qos:
    default: 1

  # 内存缓存配置（用于实时数据查询）
  cache:
    max-size: 100

  # 预设订阅的主题（自动订阅）
  # 注意：历史数据查询请使用 mcp-database 查询 MySQL
  subscriptions:
    - topic: sensor/temperature/#
      qos: 1
      description: 温度传感器数据
    - topic: sensor/humidity/#
      qos: 1
      description: 湿度传感器数据
    - topic: sensor/camera/#
      qos: 0
      description: 摄像头数据

logging:
  level:
    io.yunxi.mcp.mqtt: DEBUG
    org.eclipse.paho: INFO
